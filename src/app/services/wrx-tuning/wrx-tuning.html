<div class="product-page-container">
  
  <!-- Page Header -->
  <div class="page-header">
    <h2>{{ title }}</h2>
    <p class="subtitle">Complete the form below and then click Add to Cart once you are finished.</p>
  </div>

  <!-- Main Specifications Form -->
  <div class="product-form-container">
    <div class="card form-card">
      <!-- Specs Form -->
      <form (submit)="$event.preventDefault(); submitOrder()">
        <div class="form-grid">
          
          <!-- Model Year dropdown -->
          <div class="form-group">
            <label for="model-year">Vehicle Model Year</label>
            <select id="model-year" name="modelYear" class="form-control" [ngModel]="modelYear()" (ngModelChange)="modelYear.set($event)" required>
              <option value="2026">2026</option>
              <option value="2025">2025</option>
              <option value="2024">2024</option>
              <option value="2023">2023</option>
              <option value="2022">2022</option>
              <option value="2021">2021</option>
              <option value="2020">2020</option>
              <option value="2019">2019</option>
              <option value="2018">2018</option>
              <option value="2017">2017</option>
              <option value="2016">2016</option>
              <option value="2015">2015</option>
            </select>
          </div>

          <!-- Mileage input -->
          <div class="form-group">
            <label for="mileage">Current Mileage (Odometer)</label>
            <input 
              type="number" 
              id="mileage" 
              name="mileage"
              class="form-control" 
              [ngModel]="mileage()" 
              (ngModelChange)="mileage.set($event)" 
              required
              min="0"
            />
          </div>

        </div>

        <!-- VIN input -->
        <div class="form-group">
          <label for="vin">Vehicle Identification Number (VIN)</label>
          <input 
            type="text" 
            id="vin" 
            name="vin"
            class="form-control text-uppercase" 
            placeholder="17-Digit VIN" 
            maxlength="17" 
            minlength="17"
            [ngModel]="vin()" 
            (ngModelChange)="vin.set($event)" 
            required
            pattern="[A-HJ-NPR-Z0-9]{17}"
          />
        </div>

        <!-- Modifications input -->
        <div class="form-group">
          <label for="mods">Modifications</label>
          <textarea 
            id="mods" 
            name="mods"
            class="form-control" 
            [ngModel]="mods()" 
            (ngModelChange)="mods.set($event)"
            required
          ></textarea>
        </div>

        <!-- Notes input -->
        <div class="form-group">
          <label for="notes">Notes</label>
          <textarea 
            id="notes" 
            name="notes"
            class="form-control" 
            [ngModel]="notes()" 
            (ngModelChange)="notes.set($event)"
          ></textarea>
        </div>

        <!-- Checkout Action Footer -->
        <div class="checkout-footer">
          <button 
            type="submit" 
            class="btn btn-primary btn-checkout" 
            [disabled]="isSubmitting() || !vin() || vin().length !== 17 || mileage() === null || (mileage() ?? 0) < 0 || !mods() || mods().trim().length === 0"
          >
            <span *ngIf="!isSubmitting()">Add to cart</span>
            <span *ngIf="isSubmitting()" class="loader-dots">Adding to cart...</span>
          </button>
        </div>
      </form>
    </div>
  </div>

</div>
